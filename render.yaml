# render.yaml — Deploy IBH app to Render with one click
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend Web Service ──────────────────────────────────────────────────────
  - type: web
    name: ibh-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build && npm run db:migrate
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: APP_URL
        value: https://ibh-backend.onrender.com   # update after first deploy
      - key: DATABASE_URL
        fromDatabase:
          name: ibh-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://ibh-frontend.onrender.com
      # Set these manually in Render Dashboard > Environment
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
    # Persistent Disk — photos & PDFs survive redeploys
    disk:
      name: ibh-uploads
      mountPath: /var/data
      sizeGB: 5

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: ibh-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: ibh-postgres
    databaseName: ibh_models
    user: ibh_admin
    plan: free
